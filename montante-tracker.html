<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Montante Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c5cfc;
    --accent2: #00e5a0;
    --win: #00e5a0;
    --loss: #ff4d6d;
    --pending: #f5a623;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --r: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
    overscroll-behavior: none;
  }

  /* HEADER */
  header {
    padding: env(safe-area-inset-top, 16px) 20px 14px;
    padding-top: max(env(safe-area-inset-top), 20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }

  .new-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 50px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.15s;
    -webkit-appearance: none;
  }
  .new-btn:active { opacity: 0.75; }

  /* STATS */
  .global-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 16px 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
  }

  .stat-card .label {
    font-size: 9px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .stat-card .value { font-size: 17px; font-weight: 800; }
  .v-green { color: var(--win); }
  .v-purple { color: var(--accent); }
  .v-orange { color: var(--pending); }
  .v-red { color: var(--loss); }

  /* SECTION TITLE */
  .section-title {
    padding: 4px 20px 10px;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .cards-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 0 20px;
  }

  /* CARD */
  .montante-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card-header {
    padding: 14px 16px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }

  .card-title-block { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }

  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; margin-left: 10px; }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 50px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-active { background: rgba(124,92,252,0.15); color: var(--accent); border: 1px solid rgba(124,92,252,0.3); }
  .status-win { background: rgba(0,229,160,0.12); color: var(--win); border: 1px solid rgba(0,229,160,0.3); }
  .status-loss { background: rgba(255,77,109,0.12); color: var(--loss); border: 1px solid rgba(255,77,109,0.3); }

  .delete-card-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    line-height: 1;
  }
  .delete-card-btn:active { color: var(--loss); background: rgba(255,77,109,0.1); }

  /* BANQUE ROW */
  .bk-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 16px 10px;
  }

  .bk-val { font-size: 24px; font-weight: 800; color: var(--accent2); }
  .bk-label { font-size: 9px; color: var(--muted); font-family: 'DM Mono', monospace; text-transform: uppercase; }
  .obj-val { font-size: 13px; font-weight: 600; color: var(--muted); font-family: 'DM Mono', monospace; }

  /* PROGRESS */
  .progress-area { padding: 0 16px 14px; }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 5px;
  }
  .progress-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.4s ease;
  }

  /* PALIERS */
  .paliers-section { border-top: 1px solid var(--border); padding: 12px 16px; display: none; }
  .paliers-section.open { display: block; }

  .paliers-title {
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  .palier-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
  }
  .palier-row:last-of-type { border-bottom: none; }

  .palier-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); width: 22px; flex-shrink: 0; }

  .palier-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-win { background: var(--win); }
  .dot-loss { background: var(--loss); }
  .dot-pending { background: var(--pending); animation: pulse 1.5s infinite; }

  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  .palier-info { flex: 1; min-width: 0; }
  .palier-desc { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .palier-sub { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 1px; }

  .palier-cote { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); flex-shrink: 0; }

  .palier-gain { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700; width: 56px; text-align: right; flex-shrink: 0; }
  .gain-win { color: var(--win); }
  .gain-loss { color: var(--loss); }
  .gain-pending { color: var(--pending); }

  .palier-del {
    background: none;
    border: none;
    color: var(--border);
    font-size: 14px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.15s;
    flex-shrink: 0;
    line-height: 1;
  }
  .palier-del:active { color: var(--loss); }

  .add-palier-btn {
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .add-palier-btn:active { border-color: var(--accent); color: var(--accent); }

  /* NOTES */
  .card-notes {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    padding: 0 16px 12px;
    line-height: 1.4;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    backdrop-filter: blur(6px);
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid rgba(124,92,252,0.3);
    border-radius: 20px 20px 0 0;
    padding: 6px 20px 36px;
    width: 100%;
    max-width: 500px;
    animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 10px auto 18px;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
  .modal h2 span { color: var(--accent); }

  .form-group { margin-bottom: 13px; }

  .form-group label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: var(--accent);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .btn-save {
    flex: 2;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-save:active { opacity: 0.8; }

  /* STATUS OPTIONS */
  .status-options { display: flex; gap: 8px; }

  .status-opt {
    flex: 1;
    padding: 10px 6px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .status-opt.sel-pending { background: rgba(245,166,35,0.15); border-color: var(--pending); color: var(--pending); }
  .status-opt.sel-win { background: rgba(0,229,160,0.15); border-color: var(--win); color: var(--win); }
  .status-opt.sel-loss { background: rgba(255,77,109,0.15); border-color: var(--loss); color: var(--loss); }

  /* CONFIRM MODAL */
  .confirm-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 20px;
    margin: 20px;
    max-width: 320px;
    width: calc(100% - 40px);
  }

  .confirm-modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 8px; }
  .confirm-modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }

  .confirm-actions { display: flex; gap: 10px; }
  .btn-confirm-del {
    flex: 1;
    padding: 12px;
    background: var(--loss);
    border: none;
    border-radius: 10px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 44px; margin-bottom: 14px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* CHEVRON */
  .chevron {
    width: 16px;
    height: 16px;
    border-right: 2px solid var(--muted);
    border-bottom: 2px solid var(--muted);
    transform: rotate(45deg);
    transition: transform 0.2s;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .chevron.up { transform: rotate(-135deg); margin-top: 6px; }

  /* NET GAIN CHIP */
  .net-chip {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 50px;
  }
  .net-pos { background: rgba(0,229,160,0.12); color: var(--win); }
  .net-neg { background: rgba(255,77,109,0.12); color: var(--loss); }
  .net-zero { background: rgba(107,107,133,0.12); color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>Mes <span>Montantes</span></h1>
  <button class="new-btn" onclick="openNewMontanteModal()">+ Nouvelle</button>
</header>

<div class="global-stats" id="globalStats"></div>
<div class="section-title" id="sectionLabel"></div>
<div class="cards-list" id="cardsList"></div>

<!-- MODAL NOUVELLE MONTANTE -->
<div class="modal-overlay" id="newMontanteModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Nouvelle <span>Montante</span></h2>
    <div class="form-group">
      <label>Nom de la série</label>
      <input type="text" id="nm_name" placeholder="ex: World Cup Juin 2026">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Banque départ (€)</label>
        <input type="number" id="nm_bankroll" placeholder="20" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>Objectif (€)</label>
        <input type="number" id="nm_objective" placeholder="150" inputmode="decimal">
      </div>
    </div>
    <div class="form-group">
      <label>Mise fixe par palier (€)</label>
      <input type="number" id="nm_mise" placeholder="10" inputmode="decimal">
    </div>
    <div class="form-group">
      <label>Notes (optionnel)</label>
      <textarea id="nm_notes" rows="2" placeholder="Stratégie, contexte..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('newMontanteModal')">Annuler</button>
      <button class="btn-save" onclick="saveMontante()">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUTER PALIER -->
<div class="modal-overlay" id="addPalierModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Ajouter un <span>Palier</span></h2>
    <div class="form-group">
      <label>Description du pari</label>
      <input type="text" id="ap_desc" placeholder="ex: Allemagne +3.5 buts">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Cote</label>
        <input type="number" step="0.01" id="ap_cote" placeholder="1.65" inputmode="decimal">
      </div>
      <div class="form-group">
        <label>Mise (€)</label>
        <input type="number" id="ap_mise" placeholder="10" inputmode="decimal">
      </div>
    </div>
    <div class="form-group">
      <label>Résultat</label>
      <div class="status-options">
        <button class="status-opt sel-pending" data-val="pending" onclick="selectStatus(this)">⏳ En cours</button>
        <button class="status-opt" data-val="win" onclick="selectStatus(this)">✅ Gagné</button>
        <button class="status-opt" data-val="loss" onclick="selectStatus(this)">❌ Perdu</button>
      </div>
    </div>
    <div id="ap_banque_preview" style="font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:-4px;padding:8px 0;"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addPalierModal')">Annuler</button>
      <button class="btn-save" onclick="savePalier()">Ajouter</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-overlay" id="confirmModal" style="align-items:center">
  <div class="confirm-modal">
    <h3>Supprimer ?</h3>
    <p id="confirmText">Cette action est irréversible.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeModal('confirmModal')">Annuler</button>
      <button class="btn-confirm-del" id="confirmBtn">Supprimer</button>
    </div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('montantes_v2') || '[]');
let currentMontanteId = null;
let currentPalierStatus = 'pending';
let expandedCards = new Set();

function save() { localStorage.setItem('montantes_v2', JSON.stringify(data)); }

// Sample data on first load
if (data.length === 0) {
  data = [{
    id: 'demo1',
    name: 'World Cup Juin 2026',
    bankrollStart: 20,
    mise: 10,
    objective: 150,
    notes: 'Série World Cup — mise fixe 10€',
    createdAt: '2026-06-10',
    paliers: [
      { id:'p1', desc:'+1.5 buts Mexique - Afrique du Sud & Corée du Nord - Tchéquie', cote:1.82, mise:10, status:'win', bankBefore:20, bankAfter:26.40 },
      { id:'p2', desc:'Les 2 équipes marquent Canada - Bosnie', cote:2.10, mise:10, status:'win', bankBefore:26.40, bankAfter:37.44 },
      { id:'p3', desc:'+1.5 buts Qatar - Suisse & Brésil - Maroc', cote:1.62, mise:10, status:'win', bankBefore:37.44, bankAfter:43.65 },
      { id:'p4', desc:'Allemagne +3.5 buts', cote:1.65, mise:10, status:'pending', bankBefore:43.65, bankAfter:null },
    ]
  }];
  save();
}

// ---- UTILS ----
function getCurrentBank(m) {
  for (let i = m.paliers.length - 1; i >= 0; i--) {
    if (m.paliers[i].bankAfter !== null) return m.paliers[i].bankAfter;
  }
  return m.bankrollStart;
}

function getMontanteStatus(m) {
  const last = m.paliers[m.paliers.length - 1];
  if (!last) return 'active';
  if (last.status === 'loss') return 'loss';
  if (getCurrentBank(m) >= m.objective) return 'win';
  return 'active';
}

function fmt(n) { return n.toFixed(2) + '€'; }

// ---- RENDER ----
function renderGlobalStats() {
  const total = data.length;
  const active = data.filter(m => getMontanteStatus(m) === 'active').length;
  const profits = data.reduce((s, m) => s + getCurrentBank(m) - m.bankrollStart, 0);
  const wins = data.filter(m => getMontanteStatus(m) === 'win').length;
  document.getElementById('globalStats').innerHTML = `
    <div class="stat-card"><div class="label">Séries</div><div class="value v-purple">${total}</div></div>
    <div class="stat-card"><div class="label">Actives</div><div class="value v-orange">${active}</div></div>
    <div class="stat-card"><div class="label">P&L</div><div class="value ${profits >= 0 ? 'v-green' : 'v-red'}">${profits >= 0 ? '+' : ''}${profits.toFixed(2)}€</div></div>
  `;
  document.getElementById('sectionLabel').textContent = total ? `${total} montante${total > 1 ? 's' : ''} · ${wins} réussie${wins > 1 ? 's' : ''}` : '';
}

function renderCards() {
  const list = document.getElementById('cardsList');
  if (!data.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📈</div><p>Aucune montante.<br>Crée ta première série !</p></div>`;
    return;
  }

  list.innerHTML = data.map(m => {
    const bk = getCurrentBank(m);
    const pct = Math.min(100, Math.max(0, ((bk - m.bankrollStart) / (m.objective - m.bankrollStart)) * 100));
    const status = getMontanteStatus(m);
    const isExp = expandedCards.has(m.id);
    const badgeClass = status === 'active' ? 'status-active' : status === 'win' ? 'status-win' : 'status-loss';
    const badgeLabel = status === 'active' ? '● En cours' : status === 'win' ? '✓ Objectif atteint' : '✗ Série perdue';
    const net = bk - m.bankrollStart;
    const netClass = net > 0 ? 'net-pos' : net < 0 ? 'net-neg' : 'net-zero';

    const paliersHtml = m.paliers.map((p, i) => {
      const dotC = p.status === 'win' ? 'dot-win' : p.status === 'loss' ? 'dot-loss' : 'dot-pending';
      const gainC = p.status === 'win' ? 'gain-win' : p.status === 'loss' ? 'gain-loss' : 'gain-pending';
      const gainV = p.status === 'pending' ? '⏳' : p.status === 'win' ? `+${(p.bankAfter - p.bankBefore).toFixed(2)}€` : `-${p.mise}€`;
      return `
        <div class="palier-row">
          <span class="palier-num">P${i+1}</span>
          <div class="palier-dot ${dotC}"></div>
          <div class="palier-info">
            <div class="palier-desc">${p.desc}</div>
            <div class="palier-sub">Mise ${p.mise}€ · BK ${p.bankBefore.toFixed(2)}€</div>
          </div>
          <span class="palier-cote">@${p.cote}</span>
          <span class="palier-gain ${gainC}">${gainV}</span>
          <button class="palier-del" onclick="confirmDeletePalier('${m.id}','${p.id}',event)">✕</button>
        </div>`;
    }).join('');

    return `
      <div class="montante-card" id="card-${m.id}">
        <div class="card-header" onclick="toggleCard('${m.id}')">
          <div class="card-title-block">
            <div class="card-name">${m.name}</div>
            <div class="card-meta">${m.paliers.length} palier${m.paliers.length !== 1 ? 's' : ''} · départ ${m.bankrollStart}€</div>
          </div>
          <div class="card-right">
            <span class="status-badge ${badgeClass}">${badgeLabel}</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <span class="net-chip ${netClass}">${net >= 0 ? '+' : ''}${net.toFixed(2)}€</span>
              <button class="delete-card-btn" onclick="confirmDeleteMontante('${m.id}',event)" title="Supprimer">🗑</button>
              <div class="chevron ${isExp ? 'up' : ''}"></div>
            </div>
          </div>
        </div>
        ${m.notes ? `<div class="card-notes">💬 ${m.notes}</div>` : ''}
        <div class="bk-row">
          <div>
            <div class="bk-label">Banque actuelle</div>
            <div class="bk-val">${fmt(bk)}</div>
          </div>
          <div style="text-align:right">
            <div class="bk-label">Objectif</div>
            <div class="obj-val">${m.objective}€</div>
          </div>
        </div>
        <div class="progress-area">
          <div class="progress-labels">
            <span>${m.bankrollStart}€</span>
            <span>${pct.toFixed(0)}%</span>
            <span>${m.objective}€</span>
          </div>
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="paliers-section ${isExp ? 'open' : ''}" id="paliers-${m.id}">
          <div class="paliers-title">Historique des paliers</div>
          ${paliersHtml || '<div style="font-size:12px;color:var(--muted);padding:8px 0">Aucun palier encore.</div>'}
          <button class="add-palier-btn" onclick="openAddPalierModal('${m.id}',event)">+ Ajouter un palier</button>
        </div>
      </div>`;
  }).join('');
}

function render() { renderGlobalStats(); renderCards(); }

// ---- INTERACTIONS ----
function toggleCard(id) {
  if (expandedCards.has(id)) expandedCards.delete(id);
  else expandedCards.add(id);
  render();
}

// ---- NEW MONTANTE ----
function openNewMontanteModal() {
  ['nm_name','nm_bankroll','nm_objective','nm_mise','nm_notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('newMontanteModal').classList.add('open');
  setTimeout(() => document.getElementById('nm_name').focus(), 300);
}

function saveMontante() {
  const name = document.getElementById('nm_name').value.trim();
  const bankroll = parseFloat(document.getElementById('nm_bankroll').value);
  const objective = parseFloat(document.getElementById('nm_objective').value);
  const mise = parseFloat(document.getElementById('nm_mise').value);
  const notes = document.getElementById('nm_notes').value.trim();
  if (!name || isNaN(bankroll) || isNaN(objective) || isNaN(mise)) {
    document.getElementById('nm_name').style.borderColor = !name ? 'var(--loss)' : '';
    return;
  }
  data.unshift({ id: Date.now().toString(), name, bankrollStart: bankroll, mise, objective, notes, createdAt: new Date().toISOString().split('T')[0], paliers: [] });
  save(); closeModal('newMontanteModal'); render();
}

// ---- ADD PALIER ----
function openAddPalierModal(id, e) {
  if (e) e.stopPropagation();
  currentMontanteId = id;
  currentPalierStatus = 'pending';
  const m = data.find(x => x.id === id);
  document.getElementById('ap_desc').value = '';
  document.getElementById('ap_cote').value = '';
  document.getElementById('ap_mise').value = m ? m.mise : '';
  document.querySelectorAll('.status-opt').forEach(el => {
    el.className = 'status-opt';
    if (el.dataset.val === 'pending') el.classList.add('sel-pending');
  });
  updateBanquePreview();
  document.getElementById('addPalierModal').classList.add('open');
  setTimeout(() => document.getElementById('ap_desc').focus(), 300);
}

function selectStatus(el) {
  currentPalierStatus = el.dataset.val;
  document.querySelectorAll('.status-opt').forEach(e => e.className = 'status-opt');
  el.classList.add(`sel-${currentPalierStatus}`);
  updateBanquePreview();
}

function updateBanquePreview() {
  const m = data.find(x => x.id === currentMontanteId);
  if (!m) return;
  const bk = getCurrentBank(m);
  const cote = parseFloat(document.getElementById('ap_cote').value);
  const mise = parseFloat(document.getElementById('ap_mise').value) || m.mise;
  const prev = document.getElementById('ap_banque_preview');
  if (currentPalierStatus === 'win' && !isNaN(cote)) {
    const after = bk - mise + mise * cote;
    prev.innerHTML = `Banque actuelle : <b style="color:var(--accent2)">${fmt(bk)}</b> → <b style="color:var(--win)">${fmt(after)}</b>`;
  } else if (currentPalierStatus === 'loss') {
    prev.innerHTML = `Banque actuelle : <b style="color:var(--accent2)">${fmt(bk)}</b> → <b style="color:var(--loss)">${fmt(bk - mise)}</b>`;
  } else {
    prev.innerHTML = `Banque actuelle : <b style="color:var(--accent2)">${fmt(bk)}</b>`;
  }
}

document.addEventListener('input', e => {
  if (e.target.id === 'ap_cote' || e.target.id === 'ap_mise') updateBanquePreview();
});

function savePalier() {
  const desc = document.getElementById('ap_desc').value.trim();
  const cote = parseFloat(document.getElementById('ap_cote').value);
  const mise = parseFloat(document.getElementById('ap_mise').value);
  if (!desc || isNaN(cote) || isNaN(mise)) return;
  const m = data.find(x => x.id === currentMontanteId);
  if (!m) return;
  const bankBefore = getCurrentBank(m);
  let bankAfter = null;
  if (currentPalierStatus === 'win') bankAfter = bankBefore - mise + mise * cote;
  if (currentPalierStatus === 'loss') bankAfter = bankBefore - mise;
  m.paliers.push({ id: Date.now().toString(), desc, cote, mise, status: currentPalierStatus, bankBefore, bankAfter });
  expandedCards.add(currentMontanteId);
  save(); closeModal('addPalierModal'); render();
}

// ---- DELETE ----
let pendingDelete = null;

function confirmDeleteMontante(id, e) {
  if (e) e.stopPropagation();
  const m = data.find(x => x.id === id);
  document.getElementById('confirmText').textContent = `Supprimer "${m.name}" et tous ses paliers ? Action irréversible.`;
  pendingDelete = () => {
    data = data.filter(x => x.id !== id);
    expandedCards.delete(id);
    save(); render();
  };
  document.getElementById('confirmBtn').onclick = () => { pendingDelete && pendingDelete(); closeModal('confirmModal'); };
  document.getElementById('confirmModal').classList.add('open');
}

function confirmDeletePalier(mId, pId, e) {
  if (e) e.stopPropagation();
  document.getElementById('confirmText').textContent = 'Supprimer ce palier ? La banque sera recalculée.';
  pendingDelete = () => {
    const m = data.find(x => x.id === mId);
    if (!m) return;
    m.paliers = m.paliers.filter(p => p.id !== pId);
    // Recalculate bankAfter for remaining paliers
    let bk = m.bankrollStart;
    m.paliers.forEach(p => {
      p.bankBefore = bk;
      if (p.status === 'win') { p.bankAfter = bk - p.mise + p.mise * p.cote; bk = p.bankAfter; }
      else if (p.status === 'loss') { p.bankAfter = bk - p.mise; bk = p.bankAfter; }
      else { p.bankAfter = null; }
    });
    save(); render();
  };
  document.getElementById('confirmBtn').onclick = () => { pendingDelete && pendingDelete(); closeModal('confirmModal'); };
  document.getElementById('confirmModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

render();
</script>
</body>
</html>
